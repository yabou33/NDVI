<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Pro — NDVI, Comparaison & Courbe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f7f6; }
        #sidebar { width: 380px; min-width: 380px; padding: 18px; background: white; border-right: 1px solid #ddd; z-index: 1000; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #map { flex-grow: 1; }
        .card { border: 1px solid #e0e0e0; padding: 14px; border-radius: 8px; margin-bottom: 12px; background: #fff; }
        h2 { color: #2e7d32; font-size: 1.3em; margin: 0 0 12px; }
        small-label { display: block; font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        select, input[type=date] { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; box-sizing: border-box; }
        
        .range-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        .btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 5px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: white; transition: 0.2s; }
        .g { background: #2e7d32; } .b { background: #1565c0; } .d { background: #546e7a; }
        
        #status { margin-top: 8px; font-size: 12px; padding: 8px; border-radius: 4px; display: none; }
        .ok { background: #e8f5e9; color: #2e7d32; display: block; }
        .err { background: #fdecea; color: #c62828; display: block; }

        .img-item { border: 1px solid #eee; padding: 8px; margin-top: 4px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; font-size: 12px; }
        .img-item.active { border-color: #1565c0; background: #e3f2fd; font-weight: 700; }
        
        canvas { width: 100% !important; height: 180px !important; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Explorateur NDVI Pro</h2>

    <div class="card">
        <small-label>Gouvernorat (ou dessinez sur carte)</small-label>
        <select id="regionSelect">
            <option value="[10.83,36.72,10.90,36.80]">Nabeul (Cap Bon)</option>
            <option value="[10.12,36.82,10.22,36.95]">Ariana</option>
            <option value="[9.15,36.65,9.30,36.80]">Béja</option>
            <option value="[10.55,35.78,10.68,35.88]">Sousse</option>
        </select>
        <div id="areaDisplay" style="margin-top:8px; font-size:13px; color:#2e7d32; font-weight:bold; display:none;"></div>
    </div>

    <div class="card">
        <small-label>Période & Filtres</small-label>
        <input type="date" id="dateDebut" value="2025-01-01">
        <input type="date" id="dateFin"   value="2026-03-16" style="margin-top:4px;">
        
        <div class="range-row"><span>Nuages max :</span><strong id="cloudLbl">30%</strong></div>
        <input type="range" id="cloudRange" min="0" max="100" value="30" oninput="document.getElementById('cloudLbl').innerText=this.value+'%'">

        <div class="range-row"><span>Limite images :</span><strong id="limitLbl">20</strong></div>
        <input type="range" id="limitRange" min="5" max="100" value="20" oninput="document.getElementById('limitLbl').innerText=this.value">

        <button class="btn g" id="searchBtn">🔍 Rechercher des Images</button>
        <div id="status"></div>
    </div>

    <div id="chartCard" class="card" style="display:none">
        <small-label>📈 Évolution du NDVI</small-label>
        <canvas id="ndviChart"></canvas>
    </div>

    <div id="resultsCard" class="card" style="display:none">
        <small-label>Sélectionnez 1 ou 2 images</small-label>
        <div id="imageList"></div>
        <button class="btn b" id="compareBtn" style="display:none">📊 Lancer la Comparaison</button>
        <button class="btn d" id="downloadBtn" style="display:none">⬇️ Télécharger (.png)</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* Side-by-side local simple */
!function(t){"function"==typeof define&&define.amd?define(["leaflet"],t):"object"==typeof module&&module.exports?module.exports=t(require("leaflet")):t(L)}(function(L){var S=L.Control.extend({options:{},initialize:function(l,r,o){this._leftLayer=l;this._rightLayer=r;L.setOptions(this,o)},onAdd:function(map){this._map=map;var c=this._container=L.DomUtil.create("div","leaflet-sbs");this._divider=L.DomUtil.create("div","leaflet-sbs-divider",c);this._divider.style="position:absolute;top:0;bottom:0;width:2px;background:#fff;z-index:1000;left:50%;cursor:ew-resize;";var range=this._range=L.DomUtil.create("input","",c);range.type="range";range.style="position:absolute;top:50%;width:100%;z-index:1001;margin:0;";range.oninput=()=>this._updateClip();map.on("move zoom resize",()=>this._updateClip());return c},_updateClip:function(){var x=this._range.value/100*this._map.getSize().x;this._divider.style.left=x+"px";if(this._leftLayer.getContainer())this._leftLayer.getContainer().style.clip="rect(0,"+x+"px,9999px,0)";if(this._rightLayer.getContainer())this._rightLayer.getContainer().style.clip="rect(0,9999px,9999px,"+x+"px)"}});L.control.sideBySide=function(l,r,o){return new S(l,r,o)}});
</script>

<script>
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh";

    const map = L.map('map').setView([36.8, 10.2], 8);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Google' }).addTo(map);

    let layerL, layerR, slider, selected = [], currentBbox, currentBounds, selectedGeom = null;
    let drawnItems = new L.FeatureGroup().addTo(map);
    let chartObj = null;

    map.addControl(new L.Control.Draw({
        draw: { polygon: true, rectangle: true, polyline: false, circle: false, marker: false, circlemarker: false }
    }));

    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        const layer = e.layer;
        drawnItems.addLayer(layer);
        selectedGeom = layer.toGeoJSON().geometry;
        currentBounds = layer.getBounds();
        currentBbox = [currentBounds.getWest(), currentBounds.getSouth(), currentBounds.getEast(), currentBounds.getNorth()];
        const ha = (L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]) / 10000).toFixed(2);
        document.getElementById('areaDisplay').innerHTML = `📍 Parcelle : ${ha} ha`;
        document.getElementById('areaDisplay').style.display = 'block';
    });

    async function getToken() {
        const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ grant_type: 'client_credentials', client_id: CLIENT_ID, client_secret: CLIENT_SECRET })
        });
        return (await r.json()).access_token;
    }

    function updateRegion() {
        if (selectedGeom) return;
        currentBbox = JSON.parse(document.getElementById('regionSelect').value);
        currentBounds = L.latLngBounds([currentBbox[1], currentBbox[0]], [currentBbox[3], currentBbox[2]]);
        map.fitBounds(currentBounds);
    }
    document.getElementById('regionSelect').onchange = updateRegion;
    updateRegion();

    document.getElementById('searchBtn').onclick = async function () {
        this.disabled = true;
        document.getElementById('status').className = 'ok';
        document.getElementById('status').innerText = 'Recherche...';
        document.getElementById('status').style.display = 'block';

        try {
            const token = await getToken();
            const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bbox: currentBbox,
                    datetime: `${document.getElementById('dateDebut').value}T00:00:00Z/${document.getElementById('dateFin').value}T23:59:59Z`,
                    collections: ["sentinel-2-l2a"],
                    limit: 50
                })
            });
            const data = await res.json();
            const filtered = data.features.filter(f => (f.properties['eo:cloud_cover'] || 0) <= document.getElementById('cloudRange').value)
                                         .slice(0, document.getElementById('limitRange').value);
            
            const list = document.getElementById('imageList');
            list.innerHTML = ''; selected = [];
            document.getElementById('resultsCard').style.display = filtered.length ? 'block' : 'none';

            filtered.forEach(f => {
                const date = f.properties.datetime.split('T')[0];
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerHTML = `<span>📅 ${date}</span> <span>☁️ ${Math.round(f.properties['eo:cloud_cover'])}%</span>`;
                div.onclick = () => {
                    const idx = selected.indexOf(date);
                    if (idx > -1) { selected.splice(idx,1); div.classList.remove('active'); }
                    else if (selected.length < 2) { selected.push(date); div.classList.add('active'); }
                    document.getElementById('compareBtn').style.display = selected.length > 0 ? 'block' : 'none';
                };
                list.appendChild(div);
            });
            
            updateChart(filtered);
            document.getElementById('status').innerText = `${filtered.length} images prêtes.`;
        } catch (e) { document.getElementById('status').className='err'; document.getElementById('status').innerText='Erreur API'; }
        this.disabled = false;
    };

    function updateChart(features) {
        document.getElementById('chartCard').style.display = 'block';
        const ctx = document.getElementById('ndviChart').getContext('2d');
        const labels = features.map(f => f.properties.datetime.split('T')[0]).reverse();
        const data = features.map(() => (Math.random() * 0.5 + 0.3).toFixed(2)).reverse(); // Simulation NDVI moyen

        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'NDVI Moyen', data, borderColor: '#2e7d32', tension: 0.3, fill: true, backgroundColor: 'rgba(46, 125, 50, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1 } } }
        });
    }

    document.getElementById('compareBtn').onclick = async function () {
        const token = await getToken();
        if (layerL) map.removeLayer(layerL); if (layerR) map.removeLayer(layerR); if (slider) map.removeControl(slider);

        layerL = await getNDVILayer(selected[0], token);
        layerL.addTo(map);
        if (selected[1]) {
            layerR = await getNDVILayer(selected[1], token);
            layerR.addTo(map);
            slider = L.control.sideBySide(layerL, layerR).addTo(map);
        }
        document.getElementById('downloadBtn').style.display = 'block';
    };

    async function getNDVILayer(date, token) {
        const evalscript = `//VERSION=3
        function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluatePixel(sample) {
            let ndvi = (sample.B08 - sample.B04) / (sample.B08 + sample.B04 + 0.0001);
            if (sample.dataMask === 0) return [0,0,0,0];
            if (ndvi < 0.2) return [0.8, 0.2, 0.2, 1];
            if (ndvi < 0.45) return [1, 1, 0.2, 1];
            return [0.1, 0.6, 0.1, 1];
        }`;
        const b = selectedGeom ? { geometry: selectedGeom } : { bbox: currentBbox };
        b.properties = { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" };

        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: { bounds: b, data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: date+"T00:00:00Z", to: date+"T23:59:59Z" } } }] },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript
            })
        });
        const url = URL.createObjectURL(await r.blob());
        const l = L.imageOverlay(url, currentBounds);
        l.downUrl = url;
        return l;
    }

    document.getElementById('downloadBtn').onclick = () => {
        const a = document.createElement('a'); a.href = layerL.downUrl; a.download = `NDVI_${selected[0]}.png`; a.click();
    };
</script>
</body>
</html>
