<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NDVI Nabeul - Test Direct</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        #sidebar { width: 350px; padding: 20px; background: white; border-right: 1px solid #ddd; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #map { flex-grow: 1; }
        .card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fff; }
        button { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1b5e20; }
        .img-item { border: 1px solid #ddd; padding: 10px; margin-top: 8px; cursor: pointer; border-radius: 5px; font-size: 0.9em; transition: 0.2s; }
        .img-item:hover { background: #f1f8e9; }
        .img-item.active { border-color: #1565c0; background: #e3f2fd; font-weight: bold; }
        #status { font-size: 0.85em; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Analyse Cap Bon</h2>
    <div class="card">
        <p><strong>Zone :</strong> Carré de test (Nabeul)</p>
        <button id="searchBtn">Trouver des images</button>
        <div id="status">En attente...</div>
    </div>

    <div id="results" class="card" style="display:none">
        <label>Sélectionnez 1 ou 2 dates :</label>
        <div id="imageList"></div>
        <button id="compareBtn" style="background:#1565c0; display:none; margin-top:15px;">Afficher NDVI</button>
    </div>
</div>

<div id="map"></div>

<script>
    // Configuration Sentinel Hub
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh"; 

    // Coordonnées du carré à Nabeul
    const bboxNabeul = [10.861176, 36.755022, 10.874609, 36.769634];
    const boundsLeaflet = L.latLngBounds([36.755022, 10.861176], [36.769634, 10.874609]);

    const map = L.map('map').setView([36.762, 10.867], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // Rectangle visuel sur la zone de test
    L.rectangle(boundsLeaflet, {color: "#ff7800", weight: 1, fillOpacity: 0.1}).addTo(map);

    let layerL, layerR, slider, selected = [];

    async function getToken() {
        try {
            const body = 'grant_type=client_credentials&client_id=' + CLIENT_ID + '&client_secret=' + CLIENT_SECRET;
            const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            });
            if (r.ok) return (await r.json()).access_token;
            else { console.error("Erreur Auth:", await r.text()); return null; }
        } catch (e) { return null; }
    }

    document.getElementById('searchBtn').onclick = async () => {
        const status = document.getElementById('status');
        status.innerText = "Connexion à Sentinel Hub...";
        
        const token = await getToken();
        if(!token) { status.innerText = "Erreur : Client ID ou Secret invalide."; return; }

        status.innerText = "Recherche sur Nabeul...";
        try {
            const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "bbox": bboxNabeul,
                    "datetime": "2025-01-01T00:00:00Z/2026-03-16T23:59:59Z",
                    "collections": ["sentinel-2-l2a"],
                    "limit": 12,
                    "query": { "eo:cloud_cover": { "lt": 30 } }
                })
            });

            if (!res.ok) {
                const err = await res.json();
                status.innerText = "Erreur 400 : " + (err.error ? err.error.message : "Paramètres");
                return;
            }

            const data = await res.json();
            const list = document.getElementById('imageList');
            list.innerHTML = ""; selected = [];
            document.getElementById('results').style.display = "block";

            data.features.forEach(item => {
                const d = item.properties.datetime.split('T')[0];
                const cloud = Math.round(item.properties["eo:cloud_cover"]);
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerHTML = `📅 ${d} <span style="float:right">☁️ ${cloud}%</span>`;
                div.onclick = () => {
                    div.classList.toggle('active');
                    const idx = selected.findIndex(s => s.date === d);
                    if(idx > -1) selected.splice(idx, 1);
                    else if(selected.length < 2) selected.push({date: d, token});
                    document.getElementById('compareBtn').style.display = selected.length > 0 ? "block" : "none";
                };
                list.appendChild(div);
            });
            status.innerText = data.features.length + " images disponibles.";
        } catch (e) { status.innerText = "Erreur réseau."; }
    };

    document.getElementById('compareBtn').onclick = async () => {
        if(layerL) map.removeLayer(layerL); if(layerR) map.removeLayer(layerR); if(slider) map.removeControl(slider);
        
        document.getElementById('status').innerText = "Calcul NDVI...";
        layerL = await getNDVI(selected[0]);
        layerL.addTo(map);

        if(selected[1]) {
            layerR = await getNDVI(selected[1]);
            layerR.addTo(map);
            slider = L.control.sideBySide(layerL, layerR).addTo(map);
            document.getElementById('status').innerText = "Utilisez le curseur central.";
        } else {
            document.getElementById('status').innerText = "Affichage d'une seule date.";
        }
    };

    async function getNDVI(img) {
        const es = `//VERSION=3
        function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluate(s) {
            let v = (s.B08 - s.B04) / (s.B08 + s.B04);
            if (s.dataMask == 0) return [0,0,0,0];
            return v < 0.2 ? [0.8, 0.1, 0.1, 1] : v < 0.4 ? [0.9, 0.9, 0.2, 1] : [0.1, 0.5, 0.1, 1];
        }`;

        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${img.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: { 
                    bounds: { bbox: bboxNabeul, properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" } },
                    data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: img.date+"T00:00:00Z", to: img.date+"T23:59:59Z" } } }]
                },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript: es
            })
        });
        const blob = await r.blob();
        return L.imageOverlay(URL.createObjectURL(blob), boundsLeaflet);
    }
</script>
</body>
</html>
