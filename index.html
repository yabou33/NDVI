<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse NDVI - Cap Bon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f7f6; }
        #sidebar { width: 380px; padding: 25px; background: white; border-right: 1px solid #ddd; z-index: 1000; box-shadow: 4px 0 10px rgba(0,0,0,0.05); }
        #map { flex-grow: 1; }
        .card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 20px; background: #fff; }
        button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        #status { font-size: 0.9em; margin-top: 12px; padding: 10px; border-radius: 4px; background: #fff3e0; color: #e65100; display: none; border: 1px solid #ffe0b2; }
        .img-item { border: 1px solid #ddd; padding: 12px; margin-top: 10px; cursor: pointer; border-radius: 6px; display: flex; justify-content: space-between; transition: 0.2s; }
        .img-item.active { border-color: #1565c0; background: #e3f2fd; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Analyse Cap Bon</h2>
    <div class="card">
        <p><strong>Zone :</strong> Nabeul (Test Direct)</p>
        <button id="searchBtn">Trouver des images</button>
        <div id="status"></div>
    </div>

    <div id="results" class="card" style="display:none">
        <label style="font-weight:bold;">Images disponibles :</label>
        <div id="imageList" style="margin-top:10px;"></div>
        <button id="compareBtn" style="background:#1565c0; display:none; margin-top:20px;">Afficher NDVI</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

<script>
    // 1. VERIFIEZ CES DEUX LIGNES AVEC VOTRE CAPTURE D'ECRAN
  const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh"; 

    const bboxNabeul = [10.861176, 36.755022, 10.874609, 36.769634];
    const boundsNabeul = L.latLngBounds([36.755022, 10.861176], [36.769634, 10.874609]);

    const map = L.map('map').setView([36.762, 10.867], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.rectangle(boundsNabeul, {color: "#2e7d32", weight: 2, fillOpacity: 0.1}).addTo(map);

    let layerL, layerR, slider, selected = [];

    // FONCTION AUTH CORRIGÉE (Supprime l'erreur 401)
    async function getToken() {
        const status = document.getElementById('status');
        try {
            const response = await fetch('https://services.sentinel-hub.com/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    'grant_type': 'client_credentials',
                    'client_id': CLIENT_ID,
                    'client_secret': CLIENT_SECRET
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                console.error("Détail Erreur Auth:", errorData);
                return null;
            }
            const data = await response.json();
            return data.access_token;
        } catch (e) {
            console.error("Erreur réseau Auth:", e);
            return null;
        }
    }

    document.getElementById('searchBtn').onclick = async function() {
        const status = document.getElementById('status');
        status.style.display = "block";
        status.innerText = "Vérification des accès...";
        
        const token = await getToken();
        if(!token) {
            status.innerText = "Erreur 401 : Identifiants rejetés. Vérifiez votre Client Secret.";
            return;
        }

        status.innerText = "Recherche en cours...";
        try {
            const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "bbox": bboxNabeul,
                    "datetime": "2025-01-01T00:00:00Z/2026-03-16T23:59:59Z",
                    "collections": ["sentinel-2-l2a"],
                    "limit": 10,
                    "query": { "eo:cloud_cover": { "lt": 30 } }
                })
            });

            if (!res.ok) {
                status.innerText = "Erreur 400 : Problème de paramètres.";
                return;
            }

            const data = await res.json();
            const list = document.getElementById('imageList');
            list.innerHTML = "";
            selected = [];

            if (data.features.length === 0) {
                status.innerText = "Aucune image trouvée.";
                return;
            }

            document.getElementById('results').style.display = "block";
            data.features.forEach(item => {
                const date = item.properties.datetime.split('T')[0];
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerHTML = `<span>📅 ${date}</span> <span>☁️ ${Math.round(item.properties["eo:cloud_cover"])}%</span>`;
                div.onclick = () => {
                    const idx = selected.findIndex(s => s.date === date);
                    if(idx > -1) { selected.splice(idx, 1); div.classList.remove('active'); }
                    else if(selected.length < 2) { selected.push({date, token}); div.classList.add('active'); }
                    document.getElementById('compareBtn').style.display = selected.length > 0 ? "block" : "none";
                };
                list.appendChild(div);
            });
            status.innerText = "Images trouvées ! Sélectionnez-en une.";
        } catch (e) {
            status.innerText = "Erreur de connexion.";
        }
    };

    document.getElementById('compareBtn').onclick = async function() {
        document.getElementById('status').innerText = "Génération du rendu...";
        if(layerL) map.removeLayer(layerL); if(layerR) map.removeLayer(layerR); if(slider) map.removeControl(slider);

        layerL = await getNDVILayer(selected[0]);
        layerL.addTo(map);

        if(selected[1]) {
            layerR = await getNDVILayer(selected[1]);
            layerR.addTo(map);
            slider = L.control.sideBySide(layerL, layerR).addTo(map);
        }
        document.getElementById('status').innerText = "Analyse terminée.";
    };

    async function getNDVILayer(img) {
        const es = `//VERSION=3
        function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluate(s) {
            let v = (s.B08 - s.B04) / (s.B08 + s.B04);
            if (s.dataMask == 0) return [0,0,0,0];
            return v < 0.2 ? [0.8, 0.1, 0.1, 1] : v < 0.4 ? [0.9, 0.9, 0.2, 1] : [0.1, 0.5, 0.1, 1];
        }`;

        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${img.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: {
                    bounds: { bbox: bboxNabeul, properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" } },
                    data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: img.date+"T00:00:00Z", to: img.date+"T23:59:59Z" } } }]
                },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript: es
            })
        });
        const blob = await r.blob();
        return L.imageOverlay(URL.createObjectURL(blob), boundsNabeul);
    }
</script>
</body>
</html>
