<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NDVI Tunisie - Version Finale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/shapefile@0.6.6/dist/shapefile.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; }
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f4f4; }
        #sidebar { width: 380px; padding: 20px; background: white; border-right: 1px solid #ccc; overflow-y: auto; z-index: 1000; }
        #map { flex-grow: 1; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .status { padding: 10px; margin-top: 10px; border-radius: 4px; display: none; font-size: 0.9em; }
        .img-item { border: 1px solid #eee; padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 4px; font-size: 0.9em; }
        .img-item.active { border-color: var(--secondary); background: #e3f2fd; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Explorateur NDVI</h3>
    <div class="card">
        <label>Shapefile (ZIP)</label>
        <input type="file" id="fileInput" accept=".zip">
    </div>
    <div class="card">
        <label>Gouvernorat</label>
        <select id="regionSelect" disabled><option>Charger un ZIP...</option></select>
    </div>
    <div class="card">
        <label>Dates</label>
        <input type="date" id="dateStart" value="2025-01-01">
        <input type="date" id="dateEnd" value="2026-03-16">
        <button id="searchBtn" style="margin-top:10px" disabled>Trouver des images</button>
        <div id="status" class="status"></div>
    </div>
    <div id="results" class="card" style="display:none">
        <label>Sélectionnez 2 dates :</label>
        <div id="imageList"></div>
        <button id="compareBtn" style="display:none; background:var(--secondary); margin-top:10px">Lancer la comparaison</button>
    </div>
</div>
<div id="map"></div>

<script>
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh"; // <--- METTEZ VOTRE SECRET ICI

    const map = L.map('map').setView([34, 9], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let geoData, highlight = L.layerGroup().addTo(map);
    let layerL, layerR, slider, selected = [];

    proj4.defs("EPSG:32632", "+proj=utm +zone=32 +datum=WGS84 +units=m +no_defs");

    document.getElementById('fileInput').onchange = async (e) => {
        const zip = await JSZip.loadAsync(e.target.files[0]);
        const shp = await zip.file(/\.shp$/i)[0].async("arraybuffer");
        const dbf = await zip.file(/\.dbf$/i)[0].async("arraybuffer");
        shapefile.read(shp, dbf).then(data => {
            data.features.forEach(f => {
                const tr = (c) => proj4("EPSG:32632", "WGS84", c);
                if (f.geometry.type === "Polygon") f.geometry.coordinates = f.geometry.coordinates.map(r => r.map(tr));
                else f.geometry.coordinates = f.geometry.coordinates.map(p => p.map(r => r.map(tr)));
            });
            geoData = data;
            const sel = document.getElementById('regionSelect');
            sel.innerHTML = '<option value="">-- Sélectionner --</option>';
            data.features.forEach((f, i) => sel.add(new Option(f.properties.nm_gouv_fr || `Zone ${i+1}`, i)));
            sel.disabled = false; document.getElementById('searchBtn').disabled = false;
        });
    };

    document.getElementById('searchBtn').onclick = async () => {
    const s = document.getElementById('status');
    s.style.display = "block"; s.innerText = "Recherche en cours...";
    
    const token = await getToken();
    if(!token) { s.innerText = "Erreur Token"; return; }

    // On récupère la zone sélectionnée
    const selection = document.getElementById('regionSelect').value;
    const f = geoData.features[selection];
    
    // Calcul de la BBox avec Leaflet
    const layer = L.geoJSON(f);
    const b = layer.getBounds();
    
    // Formatage strict pour Sentinel Hub [minX, minY, maxX, maxY]
    const bbox = [
        parseFloat(b.getWest().toFixed(6)), 
        parseFloat(b.getSouth().toFixed(6)), 
        parseFloat(b.getEast().toFixed(6)), 
        parseFloat(b.getNorth().toFixed(6))
    ];

    try {
        const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                "bbox": bbox,
                "datetime": `${document.getElementById('dateStart').value}T00:00:00Z/${document.getElementById('dateEnd').value}T23:59:59Z`,
                "collections": ["sentinel-2-l2a"],
                "limit": 10,
                "query": {
                    "eo:cloud_cover": { "lt": 30 }
                }
            })
        });

        if (!res.ok) {
            const errData = await res.json();
            console.error("Détails 400:", errData);
            s.innerText = "Erreur de paramètres (400)";
            return;
        }

        const data = await res.json();
        const list = document.getElementById('imageList');
        list.innerHTML = ""; 
        selected = [];
        
        if (!data.features || data.features.length === 0) {
            s.innerText = "Aucune image sans nuages trouvée.";
            return;
        }

        document.getElementById('results').style.display = "block";
        data.features.forEach(item => {
            const d = item.properties.datetime.split('T')[0];
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `📅 ${d} (☁️ ${Math.round(item.properties["eo:cloud_cover"])}%)`;
            div.onclick = () => {
                div.classList.toggle('active');
                const idx = selected.findIndex(s => s.date === d);
                if(idx > -1) selected.splice(idx, 1);
                else if(selected.length < 2) selected.push({date: d, bbox, b, token});
                document.getElementById('compareBtn').style.display = selected.length > 0 ? "block" : "none";
            };
            list.appendChild(div);
        });
        s.innerText = data.features.length + " images trouvées.";
    } catch (e) {
        console.error(e);
        s.innerText = "Erreur réseau.";
    }
};

    async function getToken() {
        // Tentative d'authentification propre
        try {
            const body = new URLSearchParams();
            body.append('grant_type', 'client_credentials');
            body.append('client_id', CLIENT_ID);
            body.append('client_secret', CLIENT_SECRET);

            const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            });
            if (r.ok) return (await r.json()).access_token;
        } catch (e) { console.error(e); }
        return null;
    }

    document.getElementById('searchBtn').onclick = async () => {
        const s = document.getElementById('status');
        s.style.display = "block"; s.innerText = "Connexion...";
        const token = await getToken();
        if(!token) { s.innerText = "Erreur d'accès API (401/CORS)"; return; }

        const f = geoData.features[document.getElementById('regionSelect').value];
        const b = L.geoJSON(f).getBounds();
        const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()];

        const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
            method: 'POST',
            headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
            body: JSON.stringify({
                "bbox": bbox,
                "datetime": `${document.getElementById('dateStart').value}T00:00:00Z/${document.getElementById('dateEnd').value}T23:59:59Z`,
                "collections": ["sentinel-2-l2a"],
                "limit": 10,
                "query": {"eo:cloud_cover": {"lt": 30}}
            })
        });

        const data = await res.json();
        const list = document.getElementById('imageList');
        list.innerHTML = ""; selected = [];
        document.getElementById('results').style.display = "block";
        data.features.forEach(item => {
            const d = item.properties.datetime.split('T')[0];
            const div = document.createElement('div');
            div.className = 'img-item';
            div.innerHTML = `📅 ${d} (${Math.round(item.properties["eo:cloud_cover"])}% nuages)`;
            div.onclick = () => {
                div.classList.toggle('active');
                const idx = selected.findIndex(s => s.date === d);
                if(idx > -1) selected.splice(idx, 1);
                else if(selected.length < 2) selected.push({date: d, bbox, b, token});
                document.getElementById('compareBtn').style.display = selected.length > 0 ? "block" : "none";
            };
            list.appendChild(div);
        });
        s.innerText = "Images trouvées.";
    };

    document.getElementById('compareBtn').onclick = async () => {
        if(layerL) map.removeLayer(layerL); if(layerR) map.removeLayer(layerR); if(slider) map.removeControl(slider);
        layerL = await getNDVI(selected[0]); layerL.addTo(map);
        if(selected[1]) {
            layerR = await getNDVI(selected[1]); layerR.addTo(map);
            slider = L.control.sideBySide(layerL, layerR).addTo(map);
        }
    };

    async function getNDVI(img) {
        const es = `//VERSION=3
        function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluate(s) {
            let v = (s.B08 - s.B04) / (s.B08 + s.B04);
            if (s.dataMask == 0) return [0,0,0,0];
            return v < 0.2 ? [0.8, 0.1, 0.1, 1] : v < 0.4 ? [0.9, 0.9, 0.2, 1] : [0.1, 0.5, 0.1, 1];
        }`;
        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: {'Authorization': `Bearer ${img.token}`, 'Content-Type': 'application/json'},
            body: JSON.stringify({
                input: { bounds: { bbox: img.bbox, properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" } },
                data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: img.date+"T00:00:00Z", to: img.date+"T23:59:59Z" } } }] },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript: es
            })
        });
        return L.imageOverlay(URL.createObjectURL(await r.blob()), img.b);
    }
</script>
</body>
</html>
