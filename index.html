<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Explorateur NDVI Tunisie</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 360px; min-width: 360px; padding: 16px; background: white; border-right: 1px solid #ddd; z-index: 1000; overflow-y: auto; box-shadow: 2px 0 8px rgba(0,0,0,.07); }
        #map { flex-grow: 1; }
        .card { border: 1px solid #e0e0e0; padding: 13px; border-radius: 8px; margin-bottom: 13px; }
        h2 { color: #2e7d32; font-size: 1.25em; margin: 0 0 13px; }
        small-label { display: block; font-size: .78em; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 3px; }
        select, input[type=date] { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; box-sizing: border-box; }
        .range-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; color: #555; }
        input[type=range] { width: 100%; margin-top: 3px; }
        .btn { width: 100%; padding: 10px; margin-top: 7px; border-radius: 5px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: white; transition: background .2s; }
        .btn:disabled { background: #bbb !important; cursor: not-allowed; }
        .g { background: #2e7d32; } .g:hover { background: #1b5e20; }
        .b { background: #1565c0; } .b:hover { background: #0d47a1; }
        .d { background: #546e7a; } .d:hover { background: #37474f; }
        #status { margin-top: 8px; font-size: .82em; padding: 7px 10px; border-radius: 4px; display: none; }
        .err  { background: #fdecea; color: #c62828; display: block !important; }
        .ok   { background: #e8f5e9; color: #2e7d32; display: block !important; }
        .info { background: #e3f2fd; color: #1565c0; display: block !important; }
        .img-item { border: 1px solid #ddd; padding: 8px 11px; margin-top: 5px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; font-size: 12.5px; transition: .15s; }
        .img-item:hover { background: #f5f5f5; }
        .img-item.active { border-color: #1976d2; background: #e3f2fd; color: #1565c0; font-weight: 700; }
        .tag { font-size: .78em; padding: 1px 6px; border-radius: 8px; }
        .tag-ok  { background: #e8f5e9; color: #2e7d32; }
        .tag-mid { background: #fff3e0; color: #e65100; }
        .tag-bad { background: #fdecea; color: #c62828; }
        .legend { margin-top: 10px; font-size: .8em; }
        .legend-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
        .dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
        .spin { display:inline-block;width:11px;height:11px;border:2px solid #aaa;border-top-color:#1565c0;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:4px;}
        @keyframes sp{to{transform:rotate(360deg)}}
        /* side-by-side */
        .leaflet-sbs-range{cursor:ew-resize;background:transparent;position:absolute;top:50%;width:100%;z-index:999;-webkit-appearance:none;display:block;margin:0;height:100%;padding:0;outline:none;left:0}
        .leaflet-sbs-divider{background:#fff;bottom:0;cursor:ew-resize;left:50%;margin-left:-2px;position:absolute;top:0;width:4px;z-index:999;box-shadow:0 0 8px rgba(0,0,0,.5)}
        .leaflet-sbs-range::-webkit-slider-thumb{-webkit-appearance:none;background:#fff;border-radius:50%;cursor:ew-resize;height:44px;width:44px;border:2px solid #666;box-shadow:0 1px 5px rgba(0,0,0,.4)}
    </style>
</head>
<body>
<div id="sidebar">
    <h2>🌿 Explorateur NDVI — Tunisie</h2>

    <div class="card">
        <small-label>Gouvernorat</small-label>
        <select id="regionSelect">
            <option value="[10.83,36.72,10.90,36.80]">Nabeul (Cap Bon)</option>
            <option value="[10.12,36.82,10.22,36.95]">Ariana</option>
            <option value="[9.15,36.65,9.30,36.80]">Béja</option>
            <option value="[10.55,35.78,10.68,35.88]">Sousse</option>
            <option value="[10.60,34.70,10.80,34.85]">Sfax</option>
            <option value="[8.75,36.45,8.95,36.55]">Jendouba</option>
        </select>
    </div>

    <div class="card">
        <small-label>Période</small-label>
        <input type="date" id="dateDebut" value="2025-01-01">
        <input type="date" id="dateFin"   value="2026-03-16" style="margin-top:5px;">

        <div class="range-row">
            <span>Nuages max :</span><strong id="cloudLabel">30%</strong>
        </div>
        <input type="range" id="cloudRange" min="0" max="100" value="30" step="5"
               oninput="document.getElementById('cloudLabel').textContent=this.value+'%'">

        <div class="range-row">
            <span>Images max :</span><strong id="limitLabel">20</strong>
        </div>
        <input type="range" id="limitRange" min="5" max="100" value="20" step="5"
               oninput="document.getElementById('limitLabel').textContent=this.value">

        <button class="btn g" id="searchBtn" style="margin-top:11px;">🔍 Rechercher des Images</button>
        <div id="status"></div>
    </div>

    <div id="resultsCard" class="card" style="display:none">
        <small-label>Sélection (1 ou 2 images)</small-label>
        <div id="imageList"></div>
        <button class="btn b" id="compareBtn"  style="display:none;margin-top:11px;">📊 Lancer l'Analyse NDVI</button>
        <button class="btn d" id="downloadBtn" style="display:none;margin-top:6px;">⬇️ Télécharger (.png)</button>
        <div class="legend" id="legend" style="display:none">
            <strong>Légende NDVI :</strong>
            <div class="legend-row"><div class="dot" style="background:#3d85c8"></div>Eau / ombre (NDVI &lt; 0)</div>
            <div class="legend-row"><div class="dot" style="background:#cc2200"></div>Sol nu (0 – 0.1)</div>
            <div class="legend-row"><div class="dot" style="background:#ddcc00"></div>Végétation faible (0.1 – 0.35)</div>
            <div class="legend-row"><div class="dot" style="background:#1a7a1a"></div>Végétation dense (&gt; 0.35)</div>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* leaflet-side-by-side v2 — embarqué inline, sans CDN */
!function(t){"function"==typeof define&&define.amd?define(["leaflet"],t):"object"==typeof module&&module.exports?module.exports=t(require("leaflet")):t(L)}(function(L){var S=L.Control.extend({options:{thumbSize:42,padding:0},initialize:function(l,r,o){this._leftLayer=l;this._rightLayer=r;L.setOptions(this,o)},onAdd:function(map){this._map=map;var c=this._container=L.DomUtil.create("div","leaflet-sbs");this._divider=L.DomUtil.create("div","leaflet-sbs-divider",c);var range=this._range=L.DomUtil.create("input","leaflet-sbs-range",c);range.type="range";range.min=0;range.max=100;range.step="any";range.value=50;L.DomEvent.on(range,"input change",this._updateClip,this);map.on("move zoom resize",this._updateClip,this);return c},onRemove:function(map){map.off("move zoom resize",this._updateClip,this);L.DomEvent.off(this._range,"input change",this._updateClip,this);[this._leftLayer,this._rightLayer].forEach(function(l){if(l&&l.getContainer())l.getContainer().style.clip=""})},_updateClip:function(){var map=this._map,nw=map.getBounds().getNorthWest(),se=map.getBounds().getSouthEast(),tl=map.latLngToContainerPoint(nw),br=map.latLngToContainerPoint(se),x=parseInt(this._range.value)/100*map.getSize().x;this._divider.style.left=x+"px";if(this._leftLayer&&this._leftLayer.getContainer())this._leftLayer.getContainer().style.clip="rect("+tl.y+"px,"+x+"px,"+br.y+"px,"+tl.x+"px)";if(this._rightLayer&&this._rightLayer.getContainer())this._rightLayer.getContainer().style.clip="rect("+tl.y+"px,"+br.x+"px,"+br.y+"px,"+x+"px)";return this}});L.control.sideBySide=function(l,r,o){return new S(l,r,o)};return S});
</script>

<script>
    const CLIENT_ID     = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh";

    // ── Carte ─────────────────────────────────────────────────────────────
    const map = L.map('map').setView([36.8, 10.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { attribution: '© OpenStreetMap' }).addTo(map);

    let layerL = null, layerR = null, slider = null;
    let selected = [], currentBbox, currentBounds;
    let cachedToken = null, tokenExpiry = 0;

    // ── UI helpers ────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
        const el = document.getElementById('status');
        el.className = cls; el.innerHTML = msg;
    }

    // ── Token avec cache ──────────────────────────────────────────────────
    async function getToken() {
        if (cachedToken && Date.now() < tokenExpiry) return cachedToken;
        const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                grant_type: 'client_credentials',
                client_id: CLIENT_ID,
                client_secret: CLIENT_SECRET
            })
        });
        if (!r.ok) throw new Error("Auth échouée (" + r.status + ")");
        const d = await r.json();
        cachedToken = d.access_token;
        tokenExpiry = Date.now() + (d.expires_in - 60) * 1000;
        return cachedToken;
    }

    // ── Région ────────────────────────────────────────────────────────────
    function updateRegion() {
        currentBbox   = JSON.parse(document.getElementById('regionSelect').value);
        currentBounds = L.latLngBounds(
            [currentBbox[1], currentBbox[0]],
            [currentBbox[3], currentBbox[2]]
        );
        map.fitBounds(currentBounds);
        if (window.areaRect) map.removeLayer(window.areaRect);
        window.areaRect = L.rectangle(currentBounds,
            { color: "#2e7d32", weight: 2, fillOpacity: 0.07 }).addTo(map);
    }
    document.getElementById('regionSelect').onchange = updateRegion;
    updateRegion();

    // ── Recherche d'images ────────────────────────────────────────────────
    document.getElementById('searchBtn').onclick = async function () {
        this.disabled = true;
        setStatus('<span class="spin"></span>Connexion...', 'info');
        selected = [];

        try {
            const token     = await getToken();
            const cloudMax  = parseInt(document.getElementById('cloudRange').value);
            const limitVal  = parseInt(document.getElementById('limitRange').value);
            const dateDebut = document.getElementById('dateDebut').value;
            const dateFin   = document.getElementById('dateFin').value;

            setStatus('<span class="spin"></span>Recherche en cours...', 'info');

            const res = await fetch(
                'https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type':  'application/json'
                },
                body: JSON.stringify({
                    bbox:        currentBbox,
                    datetime:    `${dateDebut}T00:00:00Z/${dateFin}T23:59:59Z`,
                    collections: ["sentinel-2-l2a"],
                    limit:       100
                })
            });

            if (!res.ok) {
                const e = await res.json().catch(() => ({}));
                throw new Error(`Catalog ${res.status}: ${e.description || JSON.stringify(e)}`);
            }

            const data = await res.json();
            const list = document.getElementById('imageList');
            list.innerHTML = '';
            document.getElementById('compareBtn').style.display  = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('legend').style.display      = 'none';

            if (!data.features || data.features.length === 0) {
                setStatus('⚠️ Aucune image trouvée. Augmentez le seuil nuageux ou la période.', 'err');
                document.getElementById('resultsCard').style.display = 'none';
                this.disabled = false;
                return;
            }

            // ✅ Filtrage côté client (cloud cover + limite affichage)
            const filtered = data.features
                .filter(f => (f.properties['eo:cloud_cover'] ?? 100) < cloudMax)
                .slice(0, limitVal);

            if (filtered.length === 0) {
                setStatus(`⚠️ Aucune image avec moins de ${cloudMax}% de nuages. Augmentez le seuil.`, 'err');
                document.getElementById('resultsCard').style.display = 'none';
                this.disabled = false;
                return;
            }

            document.getElementById('resultsCard').style.display = 'block';

            filtered.forEach(f => {
                const date   = f.properties.datetime.split('T')[0];
                const clouds = Math.round(f.properties['eo:cloud_cover'] ?? 0);
                const tagCls = clouds < 15 ? 'tag-ok' : clouds < 40 ? 'tag-mid' : 'tag-bad';
                const div    = document.createElement('div');
                div.className = 'img-item';
                div.innerHTML = `<span>📅 ${date}</span>
                                 <span class="tag ${tagCls}">☁️ ${clouds}%</span>`;
                div.onclick = () => {
                    const idx = selected.findIndex(s => s.date === date);
                    if (idx > -1) { selected.splice(idx, 1); div.classList.remove('active'); }
                    else if (selected.length < 2) { selected.push({ date }); div.classList.add('active'); }
                    document.getElementById('compareBtn').style.display =
                        selected.length > 0 ? 'block' : 'none';
                };
                list.appendChild(div);
            });

            const more = filtered.length < (data.context?.matched || 0)
                ? ` (${data.context.matched} au total, ${data.features.length} sans nuages > ${cloudMax}% filtrées)` : '';
            setStatus(`✅ ${filtered.length} images (sur ${data.features.length} récupérées)${more}.`, 'ok');

        } catch (e) {
            console.error(e);
            setStatus('❌ ' + e.message, 'err');
        }
        this.disabled = false;
    };

    // ── Analyse NDVI ──────────────────────────────────────────────────────
    document.getElementById('compareBtn').onclick = async function () {
        this.disabled = true;
        setStatus('<span class="spin"></span>Génération NDVI...', 'info');

        if (layerL) { map.removeLayer(layerL); layerL = null; }
        if (layerR) { map.removeLayer(layerR); layerR = null; }
        if (slider)  { map.removeControl(slider); slider = null; }

        try {
            const token = await getToken();

            layerL = await getNDVILayer(selected[0].date, token);
            layerL.addTo(map);

            if (selected[1]) {
                layerR = await getNDVILayer(selected[1].date, token);
                layerR.addTo(map);
                slider = L.control.sideBySide(layerL, layerR).addTo(map);
                setStatus(`✅ Comparaison : ${selected[0].date} ↔ ${selected[1].date}`, 'ok');
            } else {
                setStatus(`✅ NDVI affiché pour le ${selected[0].date}`, 'ok');
            }

            document.getElementById('downloadBtn').style.display = 'block';
            document.getElementById('legend').style.display      = 'block';
            map.fitBounds(currentBounds);

        } catch (e) {
            console.error(e);
            setStatus('❌ ' + e.message, 'err');
        }
        this.disabled = false;
    };

    // ── Génération couche NDVI ────────────────────────────────────────────
    async function getNDVILayer(date, token) {

        // ✅ FIX PRINCIPAL :
        // input doit être [{ bands: [...] }] — tableau d'objets, PAS tableau de strings
        // C'est la cause exacte du 400 sur /process
        const evalscript = `//VERSION=3
function setup() {
    return {
        input: [{ bands: ["B04", "B08", "dataMask"] }],
        output: { bands: 4 }
    };
}
function evaluatePixel(sample) {
    if (sample.dataMask === 0) return [0, 0, 0, 0];
    const ndvi = (sample.B08 - sample.B04) / (sample.B08 + sample.B04 + 1e-10);
    if (ndvi < 0)    return [0.24, 0.52, 0.78, 1]; // eau / ombre
    if (ndvi < 0.1)  return [0.8,  0.13, 0.13, 1]; // sol nu
    if (ndvi < 0.35) return [0.87, 0.8,  0.0,  1]; // végétation faible
    return             [0.1,  0.48, 0.1,  1];       // végétation dense
}`;

        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type':  'application/json'
            },
            body: JSON.stringify({
                input: {
                    bounds: {
                        bbox:       currentBbox,
                        properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" }
                    },
                    data: [{
                        type: "sentinel-2-l2a",
                        dataFilter: {
                            timeRange: {
                                from: `${date}T00:00:00Z`,
                                to:   `${date}T23:59:59Z`
                            }
                        }
                    }]
                },
                output: {
                    width:  512,
                    height: 512,
                    responses: [{ identifier: "default", format: { type: "image/png" } }]
                },
                evalscript
            })
        });

        if (!r.ok) {
            // Lire l'erreur exacte de l'API pour faciliter le debug
            const errText = await r.text();
            let errMsg = `Process API ${r.status}`;
            try {
                const errJson = JSON.parse(errText);
                errMsg += ': ' + (errJson.error?.message || errJson.message || errText);
            } catch { errMsg += ': ' + errText.substring(0, 200); }
            throw new Error(errMsg);
        }

        const contentType = r.headers.get('content-type') || '';
        if (!contentType.includes('image')) {
            const txt = await r.text();
            throw new Error('Réponse non-image: ' + txt.substring(0, 200));
        }

        const blob = await r.blob();
        const url  = URL.createObjectURL(blob);
        const layer = L.imageOverlay(url, currentBounds, { opacity: 0.88 });
        layer.options.downloadUrl  = url;
        layer.options.downloadDate = date;
        return layer;
    }

    // ── Téléchargement ────────────────────────────────────────────────────
    document.getElementById('downloadBtn').onclick = function () {
        if (!layerL) return;
        const a      = document.createElement('a');
        a.href       = layerL.options.downloadUrl;
        a.download   = `NDVI_${layerL.options.downloadDate}.png`;
        a.click();
    };
</script>
</body>
</html>
