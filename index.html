<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NDVI Fix - Nabeul</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        #sidebar { width: 350px; padding: 20px; background: white; border-right: 1px solid #ddd; z-index: 1000; }
        #map { flex-grow: 1; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 10px; font-size: 0.85em; color: #d32f2f; font-weight: bold; }
        .img-item { border: 1px solid #ccc; padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 4px; }
        .img-item.active { background: #e3f2fd; border-color: #1976d2; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Analyse Satellite</h2>
    <div class="card">
        <button id="searchBtn">Démarrer la recherche</button>
        <div id="status">En attente de clic...</div>
    </div>
    <div id="results" class="card" style="display:none">
        <div id="imageList"></div>
        <button id="compareBtn" style="display:none; margin-top:10px; background:#1565c0;">Afficher NDVI</button>
    </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/gh/digidem/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

<script>
    // --- CONFIGURATION ---
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh"; 
    
    const bboxNabeul = [10.861176, 36.755022, 10.874609, 36.769634];
    const bounds = L.latLngBounds([36.755022, 10.861176], [36.769634, 10.874609]);

    const map = L.map('map').setView([36.762, 10.867], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.rectangle(bounds, {color: "green", weight: 1}).addTo(map);

    let layerL, layerR, slider, selected = [];

    // AUTHENTIFICATION
    async function getToken() {
        const body = new URLSearchParams({
            'grant_type': 'client_credentials',
            'client_id': CLIENT_ID,
            'client_secret': CLIENT_SECRET
        });
        const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body
        });
        if (r.ok) return (await r.json()).access_token;
        const err = await r.json();
        throw new Error(err.error_description || "Erreur d'identifiants");
    }

    // RECHERCHE
    document.getElementById('searchBtn').onclick = async function() {
        const status = document.getElementById('status');
        try {
            status.style.color = "blue";
            status.innerText = "Connexion...";
            const token = await getToken();
            
            status.innerText = "Recherche d'images...";
            const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "bbox": bboxNabeul,
                    "datetime": "2025-01-01T00:00:00Z/2026-03-16T23:59:59Z",
                    "collections": ["sentinel-2-l2a"],
                    "limit": 5,
                    "query": { "eo:cloud_cover": { "lt": 20 } }
                })
            });

            const data = await res.json();
            if (!res.ok) throw new Error("Erreur catalogue");

            const list = document.getElementById('imageList');
            list.innerHTML = ""; selected = [];
            document.getElementById('results').style.display = "block";
            
            data.features.forEach(f => {
                const date = f.properties.datetime.split('T')[0];
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerText = "📅 " + date + " (☁️ " + Math.round(f.properties["eo:cloud_cover"]) + "%)";
                div.onclick = () => {
                    div.classList.toggle('active');
                    const i = selected.findIndex(s => s.date === date);
                    if(i > -1) selected.splice(i, 1);
                    else if(selected.length < 2) selected.push({date, token});
                    document.getElementById('compareBtn').style.display = selected.length > 0 ? "block" : "none";
                };
                list.appendChild(div);
            });
            status.style.color = "green";
            status.innerText = data.features.length + " images prêtes.";
        } catch (e) {
            status.style.color = "red";
            status.innerText = "ERREUR : " + e.message;
        }
    };

    // NDVI
    document.getElementById('compareBtn').onclick = async function() {
        document.getElementById('status').innerText = "Rendu NDVI...";
        if(layerL) map.removeLayer(layerL); if(layerR) map.removeLayer(layerR); if(slider) map.removeControl(slider);

        layerL = await getNDVI(selected[0]);
        layerL.addTo(map);
        if(selected[1]) {
            layerR = await getNDVI(selected[1]);
            layerR.addTo(map);
            slider = L.control.sideBySide(layerL, layerR).addTo(map);
        }
    };

    async function getNDVI(img) {
        const es = `//VERSION=3
        function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluate(s) {
            let v = (s.B08 - s.B04) / (s.B08 + s.B04);
            if (s.dataMask == 0) return [0,0,0,0];
            return v < 0.2 ? [0.8,0.1,0.1,1] : v < 0.4 ? [0.9,0.9,0.2,1] : [0.1,0.5,0.1,1];
        }`;
        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${img.token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: { 
                    bounds: { bbox: bboxNabeul, properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" } },
                    data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: img.date+"T00:00:00Z", to: img.date+"T23:59:59Z" } } }]
                },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript: es
            })
        });
        return L.imageOverlay(URL.createObjectURL(await r.blob()), bounds);
    }
</script>
</body>
</html>
