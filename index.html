<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NDVI Expert — Distinction des Cultures</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f4f4; }
        #sidebar { width: 380px; min-width: 380px; padding: 18px; background: white; border-right: 1px solid #ddd; z-index: 1000; overflow-y: auto; }
        #map { flex-grow: 1; }
        .card { border: 1px solid #e0e0e0; padding: 14px; border-radius: 8px; margin-bottom: 12px; background: #fff; }
        h2 { color: #2e7d32; font-size: 1.3em; margin: 0 0 12px; }
        small-label { display: block; font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        select, input[type=date], input[type=range] { width: 100%; margin-top: 4px; border-radius: 4px; }
        
        .range-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12px; }
        .btn { width: 100%; padding: 10px; margin-top: 8px; border-radius: 5px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: white; }
        .g { background: #2e7d32; } .b { background: #1565c0; } .d { background: #546e7a; }
        
        .legend { margin-top: 10px; font-size: 0.85em; line-height: 1.5; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .dot { width: 14px; height: 14px; border-radius: 2px; border: 1px solid #999; }
        
        .img-item { border: 1px solid #eee; padding: 8px; margin-top: 4px; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; font-size: 12px; }
        .img-item.active { border-color: #1565c0; background: #e3f2fd; font-weight: 700; }
        #status { margin-top: 8px; font-size: 12px; padding: 8px; border-radius: 4px; display: none; }
        .ok { background: #e8f5e9; color: #2e7d32; display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>🌿 Diagnostic Céréalier</h2>

    <div class="card">
        <small-label>Gouvernorat</small-label>
        <select id="regionSelect">
            <option value="[10.83,36.72,10.90,36.80]">Nabeul (Cap Bon)</option>
            <option value="[10.12,36.82,10.22,36.95]">Ariana</option>
            <option value="[9.15,36.65,9.30,36.80]">Béja (Grandes cultures)</option>
            <option value="[10.55,35.78,10.68,35.88]">Sousse</option>
        </select>
        <div id="areaDisplay" style="margin-top:8px; font-size:13px; color:#2e7d32; font-weight:bold; display:none;"></div>
    </div>

    <div class="card">
        <small-label>Période & Filtres</small-label>
        <input type="date" id="dateDebut" value="2025-01-01">
        <input type="date" id="dateFin"   value="2026-03-16">
        
        <div class="range-row"><span>Nuages max :</span><strong id="cloudLbl">30%</strong></div>
        <input type="range" id="cloudRange" min="0" max="100" value="30" oninput="document.getElementById('cloudLbl').innerText=this.value+'%'">

        <div class="range-row"><span>Nombre d'images :</span><strong id="limitLbl">50</strong></div>
        <input type="range" id="limitRange" min="1" max="100" value="50" oninput="document.getElementById('limitLbl').innerText=this.value">

        <button class="btn g" id="searchBtn">🔍 Rechercher</button>
        <div id="status"></div>
    </div>

    <div class="card">
        <small-label>Légende d'Analyse</small-label>
        <div class="legend">
            <div class="legend-row"><div class="dot" style="background:#000080"></div> <b>Eau :</b> Barrages / Oueds</div>
            <div class="legend-row"><div class="dot" style="background:#cc2200"></div> <b>Sol nu / Bâti :</b> Zones urbaines ou labourées</div>
            <div class="legend-row"><div class="dot" style="background:#ffff00"></div> <b>Végétation faible :</b> Céréales (levée) / Steppes</div>
            <div class="legend-row"><div class="dot" style="background:#228b22"></div> <b>Végétation dense :</b> Blé (tallage) / Vergers</div>
        </div>
    </div>

    <div id="resultsCard" class="card" style="display:none">
        <small-label>Images disponibles</small-label>
        <div id="imageList"></div>
        <button class="btn b" id="compareBtn" style="display:none">📊 Comparer 2 dates</button>
        <button class="btn d" id="downloadBtn" style="display:none">⬇️ Télécharger (.png)</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mlevans/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

<script>
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh";

    const map = L.map('map').setView([36.7, 10.2], 9);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Google' }).addTo(map);

    let layerL, layerR, slider, selected = [], currentBbox, currentBounds, selectedGeom = null;
    let drawnItems = new L.FeatureGroup().addTo(map);

    map.addControl(new L.Control.Draw({
        draw: { polygon: true, rectangle: true, polyline: false, circle: false, marker: false, circlemarker: false }
    }));

    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        const layer = e.layer;
        drawnItems.addLayer(layer);
        selectedGeom = layer.toGeoJSON().geometry;
        currentBounds = layer.getBounds();
        currentBbox = [currentBounds.getWest(), currentBounds.getSouth(), currentBounds.getEast(), currentBounds.getNorth()];
        const ha = (L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]) / 10000).toFixed(2);
        document.getElementById('areaDisplay').innerHTML = `📍 Zone : ${ha} ha`;
        document.getElementById('areaDisplay').style.display = 'block';
    });

    async function getToken() {
        const r = await fetch('https://services.sentinel-hub.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ grant_type: 'client_credentials', client_id: CLIENT_ID, client_secret: CLIENT_SECRET })
        });
        const d = await r.json(); return d.access_token;
    }

    document.getElementById('regionSelect').onchange = function() {
        if (selectedGeom) return;
        currentBbox = JSON.parse(this.value);
        currentBounds = L.latLngBounds([currentBbox[1], currentBbox[0]], [currentBbox[3], currentBbox[2]]);
        map.fitBounds(currentBounds);
    };
    document.getElementById('regionSelect').onchange();

    document.getElementById('searchBtn').onclick = async function() {
        this.disabled = true;
        const status = document.getElementById('status');
        status.innerText = "Recherche..."; status.className = "ok"; status.style.display = "block";

        try {
            const token = await getToken();
            const res = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bbox: currentBbox,
                    datetime: `${document.getElementById('dateDebut').value}T00:00:00Z/${document.getElementById('dateFin').value}T23:59:59Z`,
                    collections: ["sentinel-2-l2a"],
                    limit: parseInt(document.getElementById('limitRange').value)
                })
            });
            const data = await res.json();
            const filtered = data.features.filter(f => (f.properties['eo:cloud_cover'] || 0) <= document.getElementById('cloudRange').value);
            
            const list = document.getElementById('imageList');
            list.innerHTML = ''; selected = [];
            document.getElementById('resultsCard').style.display = 'block';

            filtered.forEach(f => {
                const date = f.properties.datetime.split('T')[0];
                const div = document.createElement('div');
                div.className = 'img-item';
                div.innerHTML = `<span>📅 ${date}</span> <span>☁️ ${Math.round(f.properties['eo:cloud_cover'])}%</span>`;
                div.onclick = async () => {
                    if (selected.includes(date)) {
                        selected = selected.filter(d => d !== date);
                        div.classList.remove('active');
                    } else if (selected.length < 2) {
                        selected.push(date);
                        div.classList.add('active');
                        if (selected.length === 1) await render(selected[0], token);
                    }
                    document.getElementById('compareBtn').style.display = selected.length === 2 ? 'block' : 'none';
                    document.getElementById('downloadBtn').style.display = selected.length > 0 ? 'block' : 'none';
                };
                list.appendChild(div);
            });
            status.innerText = `${filtered.length} images trouvées.`;
        } catch (e) { status.innerText = "Erreur API"; }
        this.disabled = false;
    };

    async function render(date, token) {
        if (layerL) map.removeLayer(layerL); if (layerR) map.removeLayer(layerR); if (slider) map.removeControl(slider);
        layerL = await getNDVILayer(date, token);
        layerL.addTo(map);
    }

    document.getElementById('compareBtn').onclick = async function() {
        const token = await getToken();
        if (layerL) map.removeLayer(layerL); if (layerR) map.removeLayer(layerR); if (slider) map.removeControl(slider);
        layerL = await getNDVILayer(selected[0], token);
        layerR = await getNDVILayer(selected[1], token);
        layerL.addTo(map); layerR.addTo(map);
        slider = L.control.sideBySide(layerL, layerR).addTo(map);
    };

    async function getNDVILayer(date, token) {
        // Evalscript amélioré pour distinguer l'eau et les types de végétation
        const evalscript = `//VERSION=3
        function setup() { return { input: ["B02", "B03", "B04", "B08", "dataMask"], output: { bands: 4 } }; }
        function evaluatePixel(sample) {
            let ndvi = (sample.B08 - sample.B04) / (sample.B08 + sample.B04 + 0.0001);
            let ndwi = (sample.B03 - sample.B08) / (sample.B03 + sample.B08 + 0.0001); // Index Eau
            
            if (sample.dataMask === 0) return [0,0,0,0];
            
            if (ndwi > 0.1) return [0, 0, 0.5, 1]; // EAU (Bleu foncé)
            if (ndvi < 0.15) return [0.8, 0.1, 0.1, 1]; // SOL NU / VILLE (Rouge)
            if (ndvi < 0.35) return [1, 1, 0, 1];   // VEGETATION FAIBLE (Jaune)
            if (ndvi < 0.7) return [0.1, 0.5, 0.1, 1]; // VEGETATION DENSE (Vert)
            return [0, 0.3, 0, 1]; // VEGETATION TRES DENSE
        }`;

        const bData = selectedGeom ? { geometry: selectedGeom } : { bbox: currentBbox };
        bData.properties = { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" };

        const r = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: { bounds: bData, data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: date+"T00:00:00Z", to: date+"T23:59:59Z" } } }] },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript
            })
        });
        const url = URL.createObjectURL(await r.blob());
        const l = L.imageOverlay(url, currentBounds);
        l.downUrl = url;
        return l;
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.href = layerL.downUrl;
        link.download = `Analyse_Tunisie_${selected[0]}.png`;
        link.click();
    };
</script>
</body>
</html>
