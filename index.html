<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Précision — Comparaison & Surface</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #fdfdfd; }
        #sidebar { width: 380px; min-width: 380px; padding: 20px; background: white; border-right: 1px solid #ddd; z-index: 1000; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #map { flex-grow: 1; position: relative; }
        .card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fff; }
        h2 { color: #1b5e20; font-size: 1.4em; margin-top: 0; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        small-label { display: block; font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        
        /* Inputs & Buttons */
        input[type=date], select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-search { background: #2e7d32; }
        .btn-analyze { background: #1565c0; }
        .btn-download { background: #455a64; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Stats & Status */
        .stats-box { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 5px; font-size: 14px; margin-bottom: 10px; border-left: 4px solid #2e7d32; }
        #status { margin-top: 10px; font-size: 13px; padding: 10px; border-radius: 5px; display: none; }
        .err { background: #ffebee; color: #c62828; display: block; }
        .ok { background: #e8f5e9; color: #2e7d32; display: block; }

        /* Image List */
        .img-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
        .img-item { border: 1px solid #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
        .img-item:hover { background: #f1f8e9; }
        .img-item.selected { border-color: #1565c0; background: #e3f2fd; font-weight: bold; color: #1565c0; }

        /* Side by Side Range Custom */
        .leaflet-sbs-range { position: absolute; top: 50%; width: 100%; z-index: 999; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Explorateur NDVI</h2>

    <div id="surfaceCard" class="card" style="display:none">
        <small-label>Mesure de la parcelle</small-label>
        <div class="stats-box">📐 Surface : <strong id="surfaceVal">0</strong> ha</div>
    </div>

    <div class="card">
        <small-label>1. Définir la zone & période</small-label>
        <input type="date" id="dateStart" value="2025-01-01">
        <input type="date" id="dateEnd" value="2026-03-16">
        
        <div style="margin-top:10px;">
            <small-label>Couverture nuageuse max</small-label>
            <input type="range" id="cloudCover" min="0" max="100" value="30" style="width:80%"> <span id="cloudVal">30%</span>
        </div>

        <button class="btn btn-search" id="searchBtn">Trouver des images</button>
        <div id="status"></div>
    </div>

    <div id="resultsCard" class="card" style="display:none">
        <small-label>2. Sélectionner (max 2 pour comparer)</small-label>
        <div class="img-list" id="imageList"></div>
        <button class="btn btn-analyze" id="analyzeBtn" style="display:none">Lancer l'Analyse Comparative</button>
        <button class="btn btn-download" id="downloadBtn" style="display:none">Télécharger le résultat (.png)</button>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mlevans/leaflet-side-by-side@gh-pages/leaflet-side-by-side.min.js"></script>

<script>
    const CLIENT_ID = "f3a844c9-d5a2-4b52-81b2-4d500abf2860";
    const CLIENT_SECRET = "7SYrMjd6w2IaxZ7Vp0cZRqlEoH3b80kh";

    const map = L.map('map').setView([36.7, 10.5], 10);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: 'Google Satellite' }).addTo(map);

    let drawnItems = new L.FeatureGroup().addTo(map);
    let selectedGeom = null;
    let selectedItems = [];
    let layerL = null, layerR = null, sideBySideControl = null;

    // --- Configuration Dessin ---
    const drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: { polygon: true, rectangle: true, polyline: false, circle: false, marker: false, circlemarker: false }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        const layer = e.layer;
        drawnItems.addLayer(layer);
        selectedGeom = layer.toGeoJSON().geometry;
        
        // Calcul de surface (hectares)
        const area = L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]);
        document.getElementById('surfaceVal').innerText = (area / 10000).toFixed(2);
        document.getElementById('surfaceCard').style.display = 'block';
    });

    document.getElementById('cloudCover').oninput = function() { document.getElementById('cloudVal').innerText = this.value + "%"; };

    async function getToken() {
        const response = await fetch('https://services.sentinel-hub.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ grant_type: 'client_credentials', client_id: CLIENT_ID, client_secret: CLIENT_SECRET })
        });
        const data = await response.json();
        return data.access_token;
    }

    document.getElementById('searchBtn').onclick = async () => {
        if (!selectedGeom) return alert("Veuillez d'abord dessiner une parcelle sur la carte.");
        const status = document.getElementById('status');
        status.innerText = "Recherche d'images...";
        status.className = "ok";
        status.style.display = "block";

        try {
            const token = await getToken();
            const bbox = [
                map.getBounds().getWest(), map.getBounds().getSouth(),
                map.getBounds().getEast(), map.getBounds().getNorth()
            ];

            const response = await fetch('https://services.sentinel-hub.com/api/v1/catalog/1.0.0/search', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bbox: bbox,
                    datetime: `${document.getElementById('dateStart').value}T00:00:00Z/${document.getElementById('dateEnd').value}T23:59:59Z`,
                    collections: ["sentinel-2-l2a"],
                    limit: 20
                })
            });

            const data = await response.json();
            const list = document.getElementById('imageList');
            list.innerHTML = "";
            selectedItems = [];

            data.features.forEach(f => {
                const cloud = Math.round(f.properties['eo:cloud_cover']);
                if (cloud <= document.getElementById('cloudCover').value) {
                    const item = document.createElement('div');
                    item.className = 'img-item';
                    item.innerHTML = `<span>📅 ${f.properties.datetime.split('T')[0]}</span> <span>☁️ ${cloud}%</span>`;
                    item.onclick = () => {
                        item.classList.toggle('selected');
                        const date = f.properties.datetime.split('T')[0];
                        const idx = selectedItems.indexOf(date);
                        if (idx > -1) selectedItems.splice(idx, 1);
                        else if (selectedItems.length < 2) selectedItems.push(date);
                        else { item.classList.remove('selected'); alert("Max 2 images."); }
                        document.getElementById('analyzeBtn').style.display = selectedItems.length > 0 ? 'block' : 'none';
                    };
                    list.appendChild(item);
                }
            });
            document.getElementById('resultsCard').style.display = 'block';
            status.innerText = "Images chargées.";
        } catch (err) {
            status.innerText = "Erreur de connexion.";
            status.className = "err";
        }
    };

    document.getElementById('analyzeBtn').onclick = async () => {
        const token = await getToken();
        if (layerL) map.removeLayer(layerL);
        if (layerR) map.removeLayer(layerR);
        if (sideBySideControl) map.removeControl(sideBySideControl);

        layerL = await getNDVILayer(selectedItems[0], token);
        layerL.addTo(map);

        if (selectedItems.length === 2) {
            layerR = await getNDVILayer(selectedItems[1], token);
            layerR.addTo(map);
            sideBySideControl = L.control.sideBySide(layerL, layerR).addTo(map);
        }
        document.getElementById('downloadBtn').style.display = 'block';
    };

    async function getNDVILayer(date, token) {
        const evalscript = `//VERSION=3
            function setup() { return { input: ["B04", "B08", "dataMask"], output: { bands: 4 } }; }
            function evaluatePixel(sample) {
                let ndvi = (sample.B08 - sample.B04) / (sample.B08 + sample.B04 + 0.0001);
                if (sample.dataMask === 0) return [0,0,0,0];
                if (ndvi < 0.2) return [0.5, 0, 0, 1]; // Rouge (Sol nu)
                if (ndvi < 0.5) return [1, 1, 0, 1];   // Jaune (Végétation moyenne)
                return [0, 0.5, 0, 1];                // Vert (Sain)
            }`;

        const response = await fetch('https://services.sentinel-hub.com/api/v1/process', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: {
                    bounds: { geometry: selectedGeom, properties: { crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84" } },
                    data: [{ type: "sentinel-2-l2a", dataFilter: { timeRange: { from: date + "T00:00:00Z", to: date + "T23:59:59Z" } } }]
                },
                output: { responses: [{ format: { type: "image/png" } }] },
                evalscript: evalscript
            })
        });

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const bounds = L.geoJson(selectedGeom).getBounds();
        const imgLayer = L.imageOverlay(url, bounds);
        imgLayer.downloadUrl = url;
        return imgLayer;
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.href = layerL.downloadUrl;
        link.download = `NDVI_${selectedItems[0]}.png`;
        link.click();
    };
</script>

</body>
</html>
