<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AgriManager — Agrimap Satellite Expert</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --dark:#1a2332; --dark-mid:#232f42; --dark-light:#2d3d52; --dark-border:#344563;
            --cyan:#00b8d9; --cyan-light:#33cae3; --cyan-dim:rgba(0,184,217,.15);
            --white:#ffffff; --text-main:#e8edf4; --text-muted:#7a8fa8; --text-dim:#4d6278;
            --bg-page:#f0f4f8; --border:#dde4ef;
            --green:#27ae60; --green-dim:rgba(39,174,96,.15);
            --amber:#f39c12; --red:#e74c3c;
            --font:'Plus Jakarta Sans',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--font);display:flex;height:100vh;overflow:hidden;background:var(--bg-page);}

        /* SIDEBAR */
        #sidebar{width:400px;min-width:400px;background:var(--dark);display:flex;flex-direction:column;z-index:1000;box-shadow:4px 0 24px rgba(0,0,0,.35);}
        #sidebar-header{padding:16px 20px 12px;background:var(--dark);border-bottom:1px solid var(--dark-border);flex-shrink:0;}
        #sidebar-header .logo-text { color: var(--white); font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        #sidebar-header .module-tag{margin-top:5px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);opacity:.9;}
        #sidebar-body{flex:1;overflow-y:auto;padding:12px;}
        
        .card{background:var(--dark-mid);border:1px solid var(--dark-border);border-radius:10px;padding:12px;margin-bottom:9px;}
        .card-title{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:9px;display:flex;align-items:center;gap:6px;}
        .ct-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
        
        select,input[type=date]{width:100%;padding:8px 10px;background:var(--dark-light);border:1px solid var(--dark-border);border-radius:6px;color:var(--text-main);font-family:var(--font);font-size:13px;margin-bottom:6px;outline:none;}
        
        .custom-checkbox { display: flex; align-items: center; gap: 10px; color: var(--text-main); font-size: 13px; cursor: pointer; padding: 5px 0; }
        
        /* GRAPH CONTAINER */
        #chart-container { height: 180px; width: 100%; margin-top: 10px; }

        /* MAP AREA */
        #map-area{flex:1;display:flex;flex-direction:column;overflow:hidden; position: relative;}
        #map{flex:1; background: #0b0f15;}

        /* RIGHT PANEL (COMPARISON) */
        #right-panel{width:0;min-width:0;background:var(--dark);border-left:1px solid var(--dark-border);display:flex;flex-direction:column;z-index:1000;overflow:hidden;transition: width 0.3s ease;}
        #right-panel.open{width:300px;min-width:300px;}
        .rp-img-box{width:100%; aspect-ratio: 1.2; background:var(--dark-light); border-radius:8px; overflow:hidden; position: relative; margin-bottom: 10px;}
        /* Correction image tronquée : on s'assure que l'image remplit sans clip */
        .rp-img-box img { width: 100%; height: 100%; object-fit: contain; }

        .btn-action { background: var(--cyan); color: var(--dark); border: none; padding: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px;}
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <div class="logo-text">AgriManager</div>
        <div class="module-tag">Analyse Satellite & NDVI</div>
    </div>
    
    <div id="sidebar-body">
        <div class="card">
            <div class="card-title"><div class="ct-dot"></div>Paramètres d'analyse</div>
            <select id="parcel-select">
                <option value="">Sélectionner une parcelle...</option>
                <option value="p1">Ferme Nord - Blé (Hectares: 12.5)</option>
                <option value="p2">Plaine Sud - Orge (Hectares: 8.2)</option>
            </select>
            
            <label class="custom-checkbox">
                <input type="checkbox" id="check-tunisie" onchange="toggleTunisiaView()">
                Toute la Tunisie (Mode Global)
            </label>
        </div>

        <div class="card">
            <div class="card-title"><div class="ct-dot"></div>Évolution NDVI</div>
            <div id="chart-container">
                <canvas id="ndviChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><div class="ct-dot"></div>Historique des captures</div>
            <div id="image-list">
                <div style="font-size: 11px; color: var(--text-dim);">En attente de sélection...</div>
            </div>
            <button class="btn-action" onclick="toggleComparison()">Comparer les périodes</button>
        </div>
    </div>
</div>

<div id="map-area">
    <div id="map"></div>
</div>

<div id="right-panel" id="comparison-panel">
    <div style="padding: 15px;">
        <h3 style="color: var(--white); font-size: 12px; text-transform: uppercase; margin-bottom: 15px;">Comparaison Satellite</h3>
        
        <div class="rp-slot">
            <div style="color: var(--text-muted); font-size: 10px; margin-bottom: 5px;">IMAGE RÉFÉRENCE (T0)</div>
            <div class="rp-img-box" id="box-ref">
                <div style="color: var(--text-dim); font-size: 11px; text-align: center;">Aucune sélection</div>
            </div>
        </div>

        <div class="rp-slot">
            <div style="color: var(--text-muted); font-size: 10px; margin-bottom: 5px;">IMAGE ACTUELLE (T1)</div>
            <div class="rp-img-box" id="box-current">
                 <div style="color: var(--text-dim); font-size: 11px; text-align: center;">Aucune sélection</div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Initialisation de la carte
    var map = L.map('map').setView([34.0, 9.5], 7); // Centré sur la Tunisie
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let ndviChart;

    // Fonction pour gérer la vue globale Tunisie (Correction du rognage)
    function toggleTunisiaView() {
        const isGlobal = document.getElementById('check-tunisie').checked;
        if(isGlobal) {
            map.flyTo([34.0, 9.5], 7);
            // Ici, on enlèverait les filtres de clipping sur les couches images
            console.log("Vue Tunisie activée - Suppression des limites de parcelle");
        } else {
            map.setZoom(13);
        }
    }

    // Fonction pour ouvrir/fermer le panneau de comparaison
    function toggleComparison() {
        const panel = document.getElementById('right-panel');
        panel.classList.toggle('open');
    }

    // Initialisation du Graphique NDVI (Réintégration de la fonctionnalité)
    function initNDVIChart() {
        const ctx = document.getElementById('ndviChart').getContext('2d');
        ndviChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin'],
                datasets: [{
                    label: 'Indice NDVI',
                    data: [0.2, 0.35, 0.65, 0.82, 0.55, 0.25],
                    borderColor: '#00b8d9',
                    backgroundColor: 'rgba(0, 184, 217, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { min: 0, max: 1, grid: { color: '#344563' }, ticks: { color: '#7a8fa8' } },
                    x: { grid: { display: false }, ticks: { color: '#7a8fa8' } }
                }
            }
        });
    }

    window.onload = initNDVIChart;

    // Simulation de sélection d'image pour alimenter la comparaison
    function selectImageForComparison(url, target) {
        const box = document.getElementById(target);
        box.innerHTML = `<img src="${url}" alt="NDVI View">`;
    }
</script>

</body>
</html>
